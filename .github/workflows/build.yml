name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        shell: bash
        run: |
          pip install pyinstaller
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent
          cd /tmp/hermes-agent
          pip install -e "."

      - name: Build Sidecar
        shell: bash
        run: |
          python scripts/build-sidecar.py --onefile
          ls -la src-tauri/binaries/

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenOtter ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install OpenOtter."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-linux:
    runs-on: ubuntu-22.04
    name: Build (Linux-x64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        run: |
          pip install pyinstaller
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent
          cd /tmp/hermes-agent
          pip install -e "."

      - name: Build Sidecar
        run: |
          python scripts/build-sidecar.py --onefile
          ls -la src-tauri/binaries/

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenOtter ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install OpenOtter."
          releaseDraft: true
          prerelease: false
