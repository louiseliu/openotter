name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macOS-ARM64
            rust_targets: "aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            label: Linux-x64
            rust_targets: ""
          - platform: windows-latest
            args: ""
            label: Windows-x64
            rust_targets: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System Dependencies ────────────────────────────────
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Node.js ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ───────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Python + Hermes Sidecar ────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Clone hermes-agent
        shell: bash
        run: |
          HERMES_DIR="$HOME/.hermes/hermes-agent"
          mkdir -p "$HOME/.hermes"
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git "$HERMES_DIR"

      - name: Setup hermes-agent venv & install
        shell: bash
        run: |
          HERMES_DIR="$HOME/.hermes/hermes-agent"
          python -m venv "$HERMES_DIR/venv"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PYTHON="$HERMES_DIR/venv/Scripts/python"
          else
            VENV_PYTHON="$HERMES_DIR/venv/bin/python"
          fi

          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install -e "$HERMES_DIR"
          "$VENV_PYTHON" -m pip install pyinstaller

      - name: Build sidecar binary
        shell: bash
        run: |
          python scripts/build-sidecar.py --onefile
          echo "=== Sidecar binaries ==="
          ls -la src-tauri/binaries/

      # ── Build Tauri App ────────────────────────────────────
      # Without APPLE_CERTIFICATE secret, macOS builds are unsigned.
      # To enable code signing, add these repo secrets:
      #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
      #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || 'v__VERSION__' }}
          releaseName: "OpenOtter ${{ github.ref_name || 'v__VERSION__' }}"
          releaseBody: |
            ## OpenOtter ${{ github.ref_name || 'v__VERSION__' }}

            Download the installer for your platform below.

            ### Prerequisites
            - [Hermes Agent](https://github.com/NousResearch/hermes-agent) must be installed (`curl -fsSL https://hermes-agent.nousresearch.com/install | bash`)

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.msi` / `.nsis` |
            | Linux | `.deb` / `.AppImage` |

            > macOS Intel users can run the Apple Silicon version via Rosetta 2.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
